<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>E-Mail-Teile</title>
<style>
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 30px 20px;
    color: #222;
  }
  h1 {
    text-align: center;
    font-size: 26px;
    margin-bottom: 4px;
  }
  .instruction {
    text-align: center;
    font-size: 16px;
    margin-bottom: 24px;
    color: #444;
  }
  .container {
    max-width: 1100px;
    margin: 0 auto;
  }
  .pools {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
    flex-wrap: wrap;
  }
  .pool {
    flex: 1;
    min-width: 260px;
    background: #fff;
    border: 2px dashed #bbb;
    border-radius: 6px;
    padding: 12px;
    min-height: 90px;
  }
  .pool-label {
    font-size: 12px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 8px;
  }
  .tile {
    background: #eef2f7;
    border: 1px solid #c3d0e0;
    border-radius: 5px;
    padding: 8px 12px;
    margin: 5px;
    display: inline-block;
    cursor: grab;
    font-size: 14px;
    user-select: none;
  }
  .tile.text-tile { max-width: 100%; display: block; }
  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
  }
  th {
    background: #8f8f8f;
    color: #fff;
    padding: 14px;
    font-size: 18px;
    border: 1px solid #777;
  }
  th:first-child { width: 25%; }
  td {
    border: 1px dashed #999;
    padding: 10px;
    vertical-align: middle;
    height: 60px;
  }
  .drop-zone {
    min-height: 44px;
    border: 2px dashed #ccc;
    border-radius: 5px;
    background: #fafafa;
  }
  .drop-zone.filled {
    border-style: solid;
    background: #eef2f7;
  }
  .drop-zone.correct {
    border-color: #4caf50;
    background: #e8f5e9;
  }
  .drop-zone.incorrect {
    border-color: #e53935;
    background: #ffebee;
  }
  .controls {
    text-align: center;
    margin-top: 24px;
  }
  button {
    background: #444;
    color: #fff;
    border: none;
    padding: 10px 22px;
    border-radius: 5px;
    font-size: 15px;
    cursor: pointer;
    margin: 0 6px;
  }
  button:hover { background: #222; }
  #result {
    text-align: center;
    margin-top: 14px;
    font-size: 16px;
    font-weight: bold;
  }
</style>
</head>
<body>

<h1>E-Mail-Teile</h1>
<div class="instruction">Arbeitsanweisung: Ordnen Sie die Begriffe den E-Mail-Teilen zu.</div>

<div class="container">
  <div class="pools">
    <div class="pool" id="pool-teil">
      <div class="pool-label">Teil</div>
    </div>
    <div class="pool" id="pool-text">
      <div class="pool-label">Text</div>
    </div>
  </div>

  <table>
    <thead>
      <tr><th>Teil</th><th>Text</th></tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <div class="controls">
    <button onclick="checkAnswers()">Prüfen</button>
    <button onclick="location.reload()">Neu starten</button>
  </div>
  <div id="result"></div>
</div>

<script>
const pairs = [
  { teil: "Betreff", text: "Dein Wochenende" },
  { teil: "Anrede", text: "Liebe Sophie," },
  { teil: "Einleitung", text: "wie geht es dir? Ich hoffe, du hattest ein schönes Wochenende!" },
  { teil: "Hauptteil", text: "Ich war am Samstag mit meiner Familie im Park. Das Wetter war super und wir haben ein Picknick gemacht. Am Abend haben wir zusammen gekocht und einen Film gesehen. Am Sonntag habe ich ein bisschen gelernt und dann meine Freundin Mia besucht. Wir haben Kaffee getrunken und viel geredet. Es war wirklich schön!" },
  { teil: "Schluss", text: "Und du? Was hast du gemacht? Schreib mir bald!" },
  { teil: "Gruß", text: "Liebe Grüße" },
  { teil: "Unterschrift", text: "Anna" }
];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const rowsBody = document.getElementById('rows');
pairs.forEach((_, i) => {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td><div class="drop-zone" data-type="teil" data-row="${i}"></div></td>
    <td><div class="drop-zone" data-type="text" data-row="${i}"></div></td>
  `;
  rowsBody.appendChild(tr);
});

const teilPool = document.getElementById('pool-teil');
const textPool = document.getElementById('pool-text');

shuffle(pairs.map((p, i) => ({ ...p, idx: i }))).forEach(p => {
  const tile = document.createElement('div');
  tile.className = 'tile';
  tile.textContent = p.teil;
  tile.draggable = true;
  tile.dataset.type = 'teil';
  tile.dataset.idx = p.idx;
  teilPool.appendChild(tile);
});

shuffle(pairs.map((p, i) => ({ ...p, idx: i }))).forEach(p => {
  const tile = document.createElement('div');
  tile.className = 'tile text-tile';
  tile.textContent = p.text;
  tile.draggable = true;
  tile.dataset.type = 'text';
  tile.dataset.idx = p.idx;
  textPool.appendChild(tile);
});

let dragged = null;

document.addEventListener('dragstart', e => {
  if (e.target.classList.contains('tile')) dragged = e.target;
});

document.querySelectorAll('.drop-zone').forEach(zone => {
  zone.addEventListener('dragover', e => e.preventDefault());
  zone.addEventListener('drop', e => {
    e.preventDefault();
    if (!dragged) return;
    if (dragged.dataset.type !== zone.dataset.type) return;

    // if zone already has a tile, send it back to its pool
    if (zone.firstChild) {
      const back = zone.firstChild;
      (back.dataset.type === 'teil' ? teilPool : textPool).appendChild(back);
    }
    zone.appendChild(dragged);
    zone.classList.add('filled');
    zone.classList.remove('correct', 'incorrect');
  });
});

// allow dragging back to pools
[teilPool, textPool].forEach(pool => {
  pool.addEventListener('dragover', e => e.preventDefault());
  pool.addEventListener('drop', e => {
    e.preventDefault();
    if (!dragged) return;
    if (dragged.dataset.type !== (pool === teilPool ? 'teil' : 'text')) return;
    pool.appendChild(dragged);
    const parentZone = dragged.closest('.drop-zone');
  });
});

function checkAnswers() {
  let correct = 0;
  document.querySelectorAll('.drop-zone').forEach(zone => {
    const tile = zone.firstChild;
    zone.classList.remove('correct', 'incorrect');
    if (tile) {
      const row = parseInt(zone.dataset.row);
      const idx = parseInt(tile.dataset.idx);
      if (row === idx) {
        zone.classList.add('correct');
        correct++;
      } else {
        zone.classList.add('incorrect');
      }
    }
  });
  document.getElementById('result').textContent = `${correct} von ${pairs.length * 2} richtig platziert.`;
}
</script>

</body>
</html>
